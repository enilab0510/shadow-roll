<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Auth Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Supabase Auth Test</h1>
      <p class="muted">Nur Registrierung / Login / Logout zum Testen.</p>

      <div class="tabs">
        <button id="showLoginBtn" class="tab active">Login</button>
        <button id="showRegisterBtn" class="tab">Registrieren</button>
      </div>

      <div id="loginBox">
        <input id="loginEmail" type="email" placeholder="E-Mail" autocomplete="email" />
        <input id="loginPassword" type="password" placeholder="Passwort" autocomplete="current-password" />
        <button id="loginBtn" class="btn btn-primary">Einloggen</button>
      </div>

      <div id="registerBox" class="hidden">
        <input id="registerUsername" type="text" placeholder="Username" autocomplete="username" />
        <input id="registerEmail" type="email" placeholder="E-Mail" autocomplete="email" />
        <input id="registerPassword" type="password" placeholder="Passwort" autocomplete="new-password" />
        <button id="registerBtn" class="btn btn-primary">Registrieren</button>
      </div>

      <div id="messageBox" class="message info">Bereit.</div>
    </section>

    <section id="profileCard" class="card hidden">
      <h2>Eingeloggt</h2>
      <p><strong>User ID:</strong> <span id="userIdValue">-</span></p>
      <p><strong>E-Mail:</strong> <span id="emailValue">-</span></p>
      <p><strong>Username:</strong> <span id="usernameValue">-</span></p>
      <p><strong>Coins:</strong> <span id="coinsValue">-</span></p>

      <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=40"></script>
</body>
</html>
