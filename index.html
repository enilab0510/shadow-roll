<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Roll</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header class="topbar">
      <h1>🎲 Shadow Roll</h1>
      <button id="logoutBtn" class="hidden">Logout</button>
    </header>

    <!-- LOGIN / REGISTER -->
    <section id="authSection" class="card">
      <h2>Login / Registrierung</h2>

      <div class="tabs">
        <button id="showLoginBtn" class="tab active">Login</button>
        <button id="showRegisterBtn" class="tab">Registrieren</button>
      </div>

      <div id="loginBox">
        <input id="loginEmail" type="email" placeholder="E-Mail" />
        <input id="loginPassword" type="password" placeholder="Passwort" />
        <button id="loginBtn">Einloggen</button>
      </div>

      <div id="registerBox" class="hidden">
        <input id="registerUsername" type="text" placeholder="Username" />
        <input id="registerEmail" type="email" placeholder="E-Mail" />
        <input id="registerPassword" type="password" placeholder="Passwort" />
        <button id="registerBtn">Registrieren</button>
      </div>
    </section>

    <!-- APP -->
    <section id="appSection" class="card hidden">
      <h2>Profil</h2>
      <p>Username: <span id="usernameValue"></span></p>
      <p>Coins: <span id="coinsValue"></span></p>
      <p>Admin: <span id="adminValue"></span></p>
    </section>

    <!-- ADMIN -->
    <section id="adminSection" class="card hidden">
      <h2>Admin Panel</h2>

      <input id="giftUsername" placeholder="Username" />
      <input id="giftAmount" type="number" placeholder="Coins" />
      <input id="giftMessage" placeholder="Nachricht" />

      <button id="giftBtn">Coins senden</button>
    </section>
  </div>

  <!-- 🔥 WICHTIG: SUPABASE + SCRIPT -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
